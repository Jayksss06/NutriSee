name: nutrisee
description: A nutrition tracking app built with Flutter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  smooth_page_indicator: ^1.1.0
  mobile_scanner: ^3.5.6
  image_picker: ^1.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  sqflite_common_ffi: ^2.3.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
